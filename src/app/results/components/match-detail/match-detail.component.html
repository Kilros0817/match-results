<main class="match-detail">
  <!-- Back Link -->
  <div class="match-detail__header">
    <a routerLink="/results" class="match-detail__back-btn">← Back to Results</a>
  </div>

  <!-- Loading State -->
  @if (isLoading()) {
    <div class="match-detail__loading">
      <p>Loading match details...</p>
    </div>
  }

  <!-- Error State -->
  @if (loadError() && !isLoading()) {
    <div class="match-detail__error">
      <p>{{ loadError() }}</p>
    </div>
  }

  <!-- Match Card -->
  @if (!isLoading() && displayMatch()) {
    <section class="match-detail__content">
      <app-match-card [match]="displayMatch()!" />
    </section>
  }
</main>
