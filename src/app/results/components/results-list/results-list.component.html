<main class="results-page">
  <section class="results-hero" aria-labelledby="results-title">
    <p class="results-hero__eyebrow">Football Dashboard</p>
    <h1 id="results-title">Match Results</h1>
    <p class="results-hero__copy">
      Recent results for <span>{{ selectedLeague().name }}</span><br />
    </p>
  </section>

  <app-league-selector
    [leagues]="leagues()"
    [selectedLeagueId]="selectedLeague().id"
    (leagueSelected)="onLeagueChange($event)"
  />

  <div class="results-page__search-row">
    <app-search-box [value]="searchTerm()" (valueChanged)="onSearchChange($event)" />
  </div>

  <section class="results-page__kpis" aria-label="Match result metrics">
    <app-kpi-tile label="Total matches" [value]="totalMatches()" icon="pitch" />
    <app-kpi-tile label="Total goals" [value]="totalGoals()" icon="ball" />
    <app-kpi-tile label="Average goals" [value]="averageGoals()" icon="chart" />
  </section>

  <div class="results-page__sort-controls">
    <button
      class="results-page__sort-btn"
      [class.results-page__sort-btn--active]="isSortedByGoals()"
      (click)="toggleGoalsSort()"
      aria-label="Toggle sort by goals per match"
    >
      <span aria-hidden="true">⚽</span>
      Sort By Goals
      @if (isSortedByGoals()) {
        <span class="results-page__sort-indicator" aria-hidden="true">↓</span>
      }
    </button>
  </div>

  @if (isLoading()) {
    <app-state-message kind="loading" title="Loading matches" message="Fetching the latest match results..." />
  } @else if (loadError()) {
    <app-state-message
      kind="error"
      title="Could not load matches"
      [message]="loadError() ?? 'Unknown error'"
      actionLabel="Retry"
      (actionClicked)="retryLoad()"
    />
  } @else if (filteredMatches().length === 0) {
    <app-state-message
      kind="empty"
      title="No matches found"
      [message]="'No matches match your current search for ' + selectedLeague().name + '.'"
    />
  } @else {
    <section class="results-page__matches" aria-label="Recent matches">
      @for (match of displayMatches(); track match.idEvent) {
        <app-match-card [match]="match" />
      }
    </section>
  }

  <footer class="results-page__footer">
    Data provided by <span>TheSportsDB</span>
  </footer>
</main>
