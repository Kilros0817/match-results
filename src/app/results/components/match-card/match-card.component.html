<a [routerLink]="['/results', match().idEvent]" class="match-card">
  <div class="match-card__date">
    <span aria-hidden="true">▣</span>
    {{ displayDate() }}
    <span>{{ displayTime() }}</span>
  </div>

  <div class="match-card__body">
    <section class="match-card__team" aria-label="Home team">
      <img class="match-card__team-logo" [src]="homeLogo()" [alt]="match().strHomeTeam + ' logo'" />
      <strong class="match-card__team-name" appOverflowSlide [title]="match().strHomeTeam">
        <span class="match-card__team-name-text">{{ match().strHomeTeam }}</span>
      </strong>
    </section>

    <div class="match-card__score" aria-label="Final score">
      {{ score() }}
    </div>

    <section class="match-card__team" aria-label="Away team">
      <img class="match-card__team-logo" [src]="awayLogo()" [alt]="match().strAwayTeam + ' logo'" />
      <strong class="match-card__team-name" appOverflowSlide [title]="match().strAwayTeam">
        <span class="match-card__team-name-text">{{ match().strAwayTeam }}</span>
      </strong>
    </section>
  </div>

  <footer class="match-card__meta">
    <img class="match-card__league-logo" [src]="leagueLogo()" [alt]="match().strLeague + ' logo'" />
    <span>{{ match().strLeague }}</span>
  </footer>
</a>
