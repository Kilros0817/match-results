<article class="kpi-tile">
  <div class="kpi-tile__icon" [class]="'kpi-tile__icon kpi-tile__icon--' + icon()">
    @switch (icon()) {
      @case ('pitch') {
        <span aria-hidden="true">▥</span>
      }
      @case ('ball') {
        <span aria-hidden="true">⚽</span>
      }
      @case ('chart') {
        <span aria-hidden="true">↗</span>
      }
    }
  </div>

  <div>
    <p class="kpi-tile__label">{{ label() }}</p>
    <strong class="kpi-tile__value">{{ value() }}</strong>
  </div>
</article>
