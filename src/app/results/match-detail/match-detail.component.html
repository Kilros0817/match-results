<main class="match-detail">
  <nav class="match-detail__nav" aria-label="Match detail navigation">
    <a routerLink="/results" class="match-detail__back-btn">
      <span class="match-detail__back-icon" aria-hidden="true">←</span>
      <span class="match-detail__back-text">Back to results</span>
    </a>
  </nav>

  @if (isLoading()) {
    <div class="match-detail__loading">
      <p>Loading match details...</p>
    </div>
  }

  @if (loadError() && !isLoading()) {
    <div class="match-detail__error">
      <p>{{ loadError() }}</p>
    </div>
  }

  @if (!isLoading() && displayMatch(); as match) {
    <section class="match-detail__content">
      <app-match-card [match]="match" />
    </section>
  }
</main>
